<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login V2</title>
    <script>
        function login() {
            let usuario = document.getElementById("usuario").value;
            let contraseña = document.getElementById("contrasena").value;
            
            if (usuario ==="" || contraseña === "") {
                alert("Por favor complete todos los campos");
                return;
            }
            
            if (usuario === "tavito" && contraseña === "0077") {
                alert("Inicio de sesión correcto");
            } else {
                alert("Usuario o contraseña incorrectos");
            } }
    </script>
</head>
<body>
    <div class="container">
        <form action="POST">
            <div>
            <label class="label">Usuario:</label><br><br>
            <input type="text" id="usuario"><br><br>
        </div>
        <div>
            <label class="label">Contraseña:</label><br><br>
            <input type="password" id="contrasena"><br><br>
        </div> 
        <div>
            <input
                type="button"
                value="Enviar" 
                class="boton"
                onclick="login()"
            >
        </div>
        <br><br>
            <div class="register">
                <a href="RegistroTikiTaka.html">Registrate</a>
            </div>
        </form>
    </div>
    <style>
    .label{
        color: black;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        font-weight: 600;
    }
    .input{
    color: black;
    text-align: center;
    }
    .boton{
    color: black;
    font-weight: 600;
    background-color: blue;
    text-align: center;
    }
    .container {
        border-color: blue;
        align-items: center;
        text-align: center;
        width: 400px;
        height: 400px;
        border: 5px solid rgba(0, 132, 255, 0.3);
        border-radius: 25px;
        display: flex;
        box-shadow: 0 0 40px rgba(0, 132, 255, 0.3),
        0 0 80px rgba(red, green, blue, alpha),
        inset 0 0 20px rgba(208, 255, 0, 0.3);
        justify-content: center;
    }
    .register{
    text-align: center;
    }
    </style>
</body>
</html>
