<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    <script>
        
        let usuarios = [];

        function registro() {
            let txtUsuario = document.getElementById("usuario").value;
            let txtContraseña = document.getElementById("contraseña").value;

            let nuevoUsuario = {
                usuario: txtUsuario,
                contraseña: txtContraseña
            };
            usuarios.push(nuevoUsuario);
            alert("Usuario registrado con exito!");
            console.log(usuarios);
        }
    </script>
</head>
<body>
    <div class="container">
        <form onsubmit="return false;">
            <div>
                <input 
                type="button"
                value="Registrar"
                class="boton"
                onclick="registro()"
                >
            </div>
        </form>
    </div>
    <style>
        .label{
            color: black;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            font-weight: 600;
        }
        .input{
            color: black;
            text-align: center;
        }
        .boton{
            color: black;
            font-weight: 600;
            background-color: blue;
            text-align: center;
        }
        .container{
            border-color: blue;
            align-items: center;
            text-align: center;
            width: 400px;
            height: 400px;
            border: 5px solid rgba(0, 132, 255, 0.3);
            border-radius: 25px;
            display: flex;
            box-shadow: 0 0 40px rgba(0, 132, 255, 0.3),
            0 0 80px rgba(red, green, blue, alpha),
            inset 0 0 20px rgba(208, 255, 0, 0.3);
            justify-content: center;
        }
    </style>
    
</body>
</html>
