<!DOCTYPE html>
<html lang="es">
    <head>
        <meta name="viewport" content="width-device-width, initial-scale=1.0">
        <title>Registro de Usuario</title>
        <script src="RegistroyLogin.js"></script>
        <link rel="stylesheet" href="RegistroUsuario.css">
    </head>
    <body>
        <header>
         <h2 class="logo">Tiki-Taka</h2>
        </header>
        <div class="formulario">
            <h1>Registro de usuario</h1>
            <form onsubmit="event.preventDefault(); registro();">
                <div class="input-box">
                        <input type="email" id="mail" placeholder="Gmail del usuario" required></input>
                </div>
                <div class="input-box">
                    <input type="password" id="contra" placeholder="Contrase&ntilde;a del usuario" required></input>
                </div>
                
                <form method="get" action="EstLogin.html">
                  <button type="submit" id="boton">Continuar</button>
                </form>

               <div class="register-link"> 
                    <p>¿Ya tienes una cuenta? <a 
                        href="EstLogin.html"> Inicia Sesion</a></p>

                </div>

            </form>
        </div>
    </body>
</html>
