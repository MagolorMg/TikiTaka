<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-HMTL y JavaScript</title>
    <link rel="stylesheet" href="StyleLogin.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
</head>
<body>
    <header>
        <h2 class="logo">Seguro Social - ISSS</h2>
    </header>
    <div class="wrapper">
          <script src="RegistroyLogin.js"></script>
        <form onsubmit="event.preventDefault(); login()">
            <h1>Iniciar Sesión</h1>
            <div class="input-box">
                <input type="email" id="mail" placeholder="Correo Electr&oacute;nico" required>
                <i class="bx bx-user-circle"></i>
            </div>

            <div class="input-box">
                <input type="password" id="contra" placeholder="Contrase&ntilde;a" required>
                <i class="bx bx-lock"></i>
            </div>

            <div class="remember-forgot">
                <label> <input type="checkbox"> Recordarme siempre</label>
            </div>
            
            <button type="submit" class="boton">Continuar</button>

                <div class="register-link"> 
                    <p>¿No tienes una cuenta? <a 
                        href="RegistroUsuario.html"> Regístrate</a></p>

                </div>
        </form>
    </div>
</body>
</html>
